<!DOCTYPE html>
<html>
<head>
	<title>Hello </title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
        }
        form {
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        table {
            margin: auto;
        }
        .img{
            display: block;
            margin: 0 auto;
            text-align: center;
            border-radius: 20%;
            width: 200px;
            height: 180px;
            overflow: hidden;
        }
        input{
            width: 100%;
            
        }

        button{
            margin-top: 10px;
            border-radius: 8%;
            border: solid 1px #ccc;
            background-color: rgb(32, 59, 4);
            color: #fff;
            text-align: center;
            width: 100%;
            height: 25px;
        }

         button:hover{
            cursor: pointer;
            margin-top: 10px;
            border-radius: 8%;
            border: solid 1px #ccc;
            background-color: rgb(202, 238, 164);
            color: #000;
            text-align: center;
            width: 100%;
            height: 25px;
        }

    </style>
    
       

</head>
<body>
       <form id="login">
            <table>
                <tr>
                    <td colspan="2">
                        <img class="img" src="img/person.png" />

                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <b>Username:</b><br>
                        <input type="text" id="user" name="username"/>
                    </td>
                </tr>

                <tr>
                    <td colspan="2">
                        <b>Password:</b><br>
                        <input type="password" id="pwd" name="password"/>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                   
                        <button type="submit">Login</button>
                    </td>
                </tr>
            </table>
       
       </form>
       <script>
        
       </script>
</body>
</html>
