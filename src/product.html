<!DOCTYPE html>
<html>
<head>
	<title>Product</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="../Minh_javascript/product.json"></script>
</head>
<body>
   
    <script>
        let products=[];

        window.onload=function(){
            loadProducts();
        }

        function loadProducts(){
            let xhr = new XMLHttpRequest();
            xhr.open("GET","product.json",true);

            xhr.onload=function(){
                if(xhr.status==200){
                    products = JSON.parse(xhr.responseText);
                    renderProduct(products);
                }
            };
            xhr.send();
        }

        function renderProduct(list){
            let html='';
            list.forEach(e => {
                html = html + `
                <div class="col-md-2">
                    <div class="card mb-3">
                        <img src="${e.img}" class="card-img-top"/>

                        <div class="card-body">
                            <h5>${e.name}</h5>
                            <p>${e.price}</p>
                        </div>
                    </div>
                </div>
                `
            });
            document.getElementById('product-list').innerHTML = html;
        }

         function sortProducts(type) {
                if (type == 'asc') {
                    products.sort((a,b) => a.price - b.price);
                } else {
                    products.sort((a,b) => b.price - a.price);
                }
                renderProduct(products);
            }
    </script>



<div class="container mt-4">
    <h2>Danh sach dien thoai</h2>
    <select class="form-select w-25 mb-3" onchange="sortProducts(this.value)">
        <option value="asc">Gia tang dan</option>
        <option value="desc">Gia giam dan</option>
    </select>
</div>
 <div class="row mt-4" id="product-list"></div>
  <div class="col-md-4">
        <div class="card mb-3">
            <img src=""/>
        </div>
  </div>

</div>
</body>
</html>
